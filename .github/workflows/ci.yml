name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sonar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # We pass the DB details as environment variables to ensure Maven tests use localhost
      run: mvn -B package --file pom.xml
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sonar
        SPRING_DATASOURCE_USERNAME: sonar
        SPRING_DATASOURCE_PASSWORD: sonar

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t cyborden/springboot-app:latest .

    - name: Push Docker image
      run: docker push cyborden/springboot-app:latest

  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=pokemon-api \
            -Dsonar.host.url=https://squshier-weldon-metazoal.ngrok-free.dev \ 
            -Dsonar.token=sqp_97df7247d236c1220019f19e29068ed92f844a91
